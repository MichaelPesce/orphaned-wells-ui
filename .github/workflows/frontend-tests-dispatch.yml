name: App Tests Dispatch

on:
  workflow_call:
    inputs:
      checkout_repository:
        description: Repository to check out and test.
        required: false
        type: string
        default: CATALOG-Historic-Records/orphaned-wells-ui
      checkout_ref:
        description: Branch, tag, or SHA to check out.
        required: false
        type: string
        default: main
      app_state:
        description: Value for REACT_APP_STATE.
        required: false
        type: string
        default: illinois
      install_python_package:
        description: Install an additional Python package into the backend container before E2E tests. Use this when calling the workflow from OGRRE_data_cleaning.
        required: false
        type: boolean
        default: false
      python_package_repository:
        description: Python package repository to check out. Defaults to the caller repository when install_python_package is true.
        required: false
        type: string
        default: ""
      python_package_ref:
        description: Branch, tag, or SHA for the Python package checkout. Defaults to the caller SHA when install_python_package is true.
        required: false
        type: string
        default: ""
      python_package_path:
        description: Workspace path for the Python package checkout.
        required: false
        type: string
        default: caller-python-package
    secrets:
      checkout_token:
        description: Optional token for checking out a private or internal repository.
        required: false

defaults:
  run:
    shell: bash -l {0}

jobs:
  frontend-tests:
    name: Frontend testing (${{ matrix.os }})
    runs-on: ${{ matrix.os-version }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - linux
        include:
          - os: linux
            os-version: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || github.ref }}
          token: ${{ secrets.checkout_token || github.token }}

      - name: Check out Python package under test
        if: ${{ inputs.install_python_package }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.python_package_repository || github.repository }}
          ref: ${{ inputs.python_package_ref || github.sha }}
          path: ${{ inputs.python_package_path }}
          token: ${{ secrets.checkout_token || github.token }}

      - name: Install JS dependencies
        run: npm clean-install

      - name: Run component tests
        run: npm test

      - name: Add backend url to .env file
        run: echo REACT_APP_BACKEND_URL=http://localhost:8001 >> .env

      - name: Add BYPASS_AUTH to .env file
        run: echo BYPASS_AUTH=true >> .env

      - name: Add state to .env file
        run: echo REACT_APP_STATE=${{ inputs.app_state || 'illinois' }} >> .env

      - name: Start docker containers
        run: npm run docker:start

      - name: Install Python package under test in backend container
        if: ${{ inputs.install_python_package }}
        env:
          PYTHON_PACKAGE_PATH: ${{ inputs.python_package_path }}
        run: |
          compose=(docker compose --env-file deployment/.env -f deployment/docker-compose.dev.yml)

          for i in {1..180}; do
            if [ -n "$("${compose[@]}" ps --status running -q backend)" ]; then
              break
            fi
            "${compose[@]}" ps
            sleep 2
          done

          if [ -z "$("${compose[@]}" ps --status running -q backend)" ]; then
            "${compose[@]}" logs --no-color --tail=200 backend
            exit 1
          fi

          "${compose[@]}" exec -T backend rm -rf /tmp/python-package-under-test
          "${compose[@]}" cp "${PYTHON_PACKAGE_PATH}" backend:/tmp/python-package-under-test
          "${compose[@]}" exec -T backend python -m pip install --no-cache-dir --upgrade --force-reinstall /tmp/python-package-under-test
          "${compose[@]}" restart backend

      - name: Wait for docker app health
        run: |
          for i in {1..180}; do
            if curl -fsS http://localhost:8001/docs >/dev/null && curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            docker compose --env-file deployment/.env -f deployment/docker-compose.dev.yml ps
            sleep 2
          done

          docker compose --env-file deployment/.env -f deployment/docker-compose.dev.yml logs --no-color --tail=200
          exit 1

      - name: Run E2E tests
        run: npx cypress run

      - name: Shut down docker containers
        if: always()
        run: npm run docker:clean

      - name: Upload artifact for screenshots & videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress_results-${{ matrix.os }}
          path: |
            cypress/screenshots/
            cypress/videos/
