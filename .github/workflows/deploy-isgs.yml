name: Deploy ISGS Frontend

on:
  push:
    branches: [isgs]

jobs:
  isgs-production-deploy:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui'
    name: Deploy to Google App Engine
    uses: ./.github/workflows/deploy-dispatch.yml
    with:
      app_yaml: deployment/app-engine/app-isgs.yaml
      state: illinois
      collaborator: isgs
      app_environment: isgs
    secrets:
      backend_url: ${{ secrets.ISGS_BACKEND_URL }}
      google_clientid: ${{ secrets.GOOGLE_CLIENTID }}
      gcloud_service_account_json: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_JSON }}
